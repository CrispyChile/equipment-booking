<script>
  // =============================
  // SUPABASE CONFIG
  // =============================
  const SUPABASE_URL = "https://nqkxpdkemfntarcxixoc.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

  let supabase = null;

  function initSupabase() {
    try {
      if (!window.supabase) {
        console.warn("Supabase library not loaded");
        return;
      }

      supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );
    } catch (err) {
      console.error("Supabase init failed:", err);
      supabase = null;
    }
  }

  // =============================
  // SQUARE LINKS
  // =============================
  const squareDepositLinks = {
    "Stump Grinder": {
      daily: "https://square.link/u/LQRDcbOQ",
      weekly: "https://square.link/u/LQRDcbOQ"
    }
  };

  // =============================
  // PRICING
  // =============================
  const pricing = {
    "Stump Grinder": {
      dailyRate: 150,
      weeklyRate: 450,
      dailyDeposit: 50,
      weeklyDeposit: 100
    }
  };

  // =============================
  // STATE
  // =============================
  const headers = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  let currentDate = new Date();
  let startDate = null;
  let endDate = null;
  let cachedBookings = [];

  // =============================
  // ELEMENTS
  // =============================
  const calendarHeaders = document.getElementById("calendarHeaders");
  const calendarGrid = document.getElementById("calendarGrid");
  const monthLabel = document.getElementById("monthLabel");

  const equipmentSelect = document.getElementById("equipmentSelect");
  const statusText = document.getElementById("statusText");

  const selectedRangeDisplay = document.getElementById("selectedRange");
  const totalDaysDisplay = document.getElementById("totalDays");
  const rentalTypeDisplay = document.getElementById("rentalType");
  const totalPriceDisplay = document.getElementById("totalPrice");
  const depositDueDisplay = document.getElementById("depositDue");

  // =============================
  // HELPERS
  // =============================
  function setStatus(msg) {
    if (statusText) statusText.textContent = msg;
  }

  function formatDate(date) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function parseDate(str) {
    const [y,m,d] = str.split("-");
    return new Date(y, m - 1, d);
  }

  function calculateDays(start, end) {
    return Math.round((parseDate(end) - parseDate(start)) / 86400000) + 1;
  }

  function getPricing(equipment, days) {
    const p = pricing[equipment];
    if (!p) return null;

    if (days >= 7) {
      return {
        type: "WEEKLY",
        total: p.weeklyRate,
        deposit: p.weeklyDeposit
      };
    }

    return {
      type: "DAILY",
      total: p.dailyRate * days,
      deposit: p.dailyDeposit
    };
  }

  function isBooked(dateString, equipment) {
    return cachedBookings.some(b =>
      b.equipment === equipment &&
      dateString >= b.start_date &&
      dateString <= b.end_date
    );
  }

  // =============================
  // UI RENDER
  // =============================
  function renderHeaders() {
    calendarHeaders.innerHTML = "";
    headers.forEach(h => {
      const div = document.createElement("div");
      div.className = "day-header";
      div.textContent = h;
      calendarHeaders.appendChild(div);
    });
  }

  function renderCalendar() {
    calendarGrid.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const equipment = equipmentSelect.value;

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    monthLabel.textContent =
      firstDay.toLocaleString("default", { month: "long" }) + " " + year;

    for (let i = 0; i < firstDay.getDay(); i++) {
      const empty = document.createElement("div");
      empty.className = "day disabled";
      calendarGrid.appendChild(empty);
    }

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const date = new Date(year, month, d);
      const ds = formatDate(date);

      const div = document.createElement("div");
      div.className = "day";
      div.textContent = d;

      if (isBooked(ds, equipment)) div.classList.add("booked");

      if (startDate && ds === startDate) div.classList.add("selected");
      if (startDate && endDate && ds >= startDate && ds <= endDate) {
        div.classList.add("selected");
      }

      div.onclick = () => {
        if (div.classList.contains("booked")) return;

        if (!startDate) {
          startDate = ds;
          endDate = null;
        } else if (!endDate) {
          endDate = ds < startDate ? startDate : ds;
          if (ds < startDate) startDate = ds;
        } else {
          startDate = ds;
          endDate = null;
        }

        updateUI();
        renderCalendar();
      };

      calendarGrid.appendChild(div);
    }
  }

  function updateUI() {
    if (!startDate) {
      selectedRangeDisplay.textContent = "None";
      totalDaysDisplay.textContent = "0";
      return;
    }

    if (!endDate) {
      selectedRangeDisplay.textContent = startDate;
      totalDaysDisplay.textContent = "1";
      return;
    }

    const days = calculateDays(startDate, endDate);
    const price = getPricing(equipmentSelect.value, days);

    selectedRangeDisplay.textContent = `${startDate} → ${endDate}`;
    totalDaysDisplay.textContent = days;
    rentalTypeDisplay.textContent = price.type;
    totalPriceDisplay.textContent = price.total;
    depositDueDisplay.textContent = price.deposit;
  }

  // =============================
  // LOAD BOOKINGS
  // =============================
  async function loadBookings() {
    if (!supabase) {
      cachedBookings = [];
      setStatus("Offline mode (no Supabase)");
      return;
    }

    try {
      const { data } = await supabase.from("bookings").select("*");
      cachedBookings = data || [];
      setStatus("Loaded bookings");
    } catch (err) {
      console.error(err);
      cachedBookings = [];
      setStatus("Booking load failed");
    }
  }

  // =============================
  // INIT
  // =============================
  async function init() {
    renderHeaders();
    initSupabase();
    await loadBookings();
    renderCalendar();
    updateUI();
  }

  init();
</script>
