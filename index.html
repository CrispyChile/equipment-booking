<script>
/* =============================
   EQUIPMENT BOOKING SYSTEM (STABLE BUILD)
   ============================= */

console.log("SCRIPT IS RUNNING");

// =============================
// CONFIG
// =============================
const SUPABASE_URL = "https://nqkxpdkemfntarcxixoc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xa3hwZGtlbWZudGFyY3hpeG9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzkyMDYsImV4cCI6MjA5MTM1NTIwNn0.wPMD8SJpiIG8JXru4IQsO7p6bfQBOv9M31AbhEswP3g";

let supabase = null;

// =============================
// SAFE DOM WAIT (IMPORTANT FIX)
// =============================
function waitForDOM() {
  return new Promise(resolve => {
    if (document.readyState === "complete" || document.readyState === "interactive") {
      resolve();
    } else {
      document.addEventListener("DOMContentLoaded", resolve);
    }
  });
}

// =============================
// DATA
// =============================
const headers = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let currentDate = new Date();
let startDate = null;
let endDate = null;
let cachedBookings = [];

// Square links
const squareDepositLinks = {
  "Stump Grinder": {
    daily: "https://square.link/u/LQRDcbOQ",
    weekly: "https://square.link/u/LQRDcbOQ"
  }
};

// Pricing
const pricing = {
  "Stump Grinder": {
    dailyRate: 150,
    weeklyRate: 450,
    dailyDeposit: 50,
    weeklyDeposit: 100
  }
};

// =============================
// DOM HELPERS
// =============================
function el(id) {
  const node = document.getElementById(id);
  if (!node) console.warn("Missing element:", id);
  return node;
}

// =============================
// SUPABASE INIT (SAFE)
// =============================
function initSupabase() {
  try {
    if (!window.supabase) {
      console.warn("Supabase library not loaded");
      return;
    }

    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("Supabase initialized");
  } catch (e) {
    console.error("Supabase init failed:", e);
  }
}

// =============================
// DATE HELPERS
// =============================
function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function parseDate(s) {
  const [y,m,d] = s.split("-");
  return new Date(y, m - 1, d);
}

function daysBetween(a,b){
  return Math.round((parseDate(b)-parseDate(a))/86400000)+1;
}

// =============================
// PRICING
// =============================
function getPricing(equipment, days){
  const p = pricing[equipment];
  if (!p) return null;

  if (days >= 7) {
    return {
      type: "WEEKLY",
      total: p.weeklyRate,
      deposit: p.weeklyDeposit
    };
  }

  return {
    type: "DAILY",
    total: p.dailyRate * days,
    deposit: p.dailyDeposit
  };
}

// =============================
// BOOKINGS CHECK
// =============================
function isBooked(dateStr, equipment){
  return cachedBookings.some(b =>
    b.equipment === equipment &&
    dateStr >= b.start_date &&
    dateStr <= b.end_date
  );
}

// =============================
// RENDER HEADERS
// =============================
function renderHeaders(){
  const row = el("calendarHeaders");
  if (!row) return;

  row.innerHTML = "";

  headers.forEach(h=>{
    const d = document.createElement("div");
    d.className = "day-header";
    d.textContent = h;
    row.appendChild(d);
  });
}

// =============================
// CALENDAR RENDER (SAFE)
// =============================
function renderCalendar(){
  const grid = el("calendarGrid");
  const label = el("monthLabel");

  if (!grid || !label) return;

  grid.innerHTML = "";

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  const first = new Date(y,m,1);
  const last = new Date(y,m+1,0);

  label.textContent = first.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });

  for(let i=0;i<first.getDay();i++){
    const empty=document.createElement("div");
    empty.className="day disabled";
    grid.appendChild(empty);
  }

  const equipment = el("equipmentSelect")?.value || "Stump Grinder";

  for(let day=1; day<=last.getDate(); day++){
    const date = new Date(y,m,day);
    const ds = formatDate(date);

    const cell=document.createElement("div");
    cell.className="day";
    cell.textContent=day;

    if(isBooked(ds,equipment)) cell.classList.add("booked");

    if(startDate && ds===startDate) cell.classList.add("selected");
    if(startDate && endDate && ds>=startDate && ds<=endDate){
      cell.classList.add("selected");
    }

    cell.onclick=()=>{
      if(cell.classList.contains("booked")) return;

      if(!startDate){
        startDate=ds;
        endDate=null;
      } else if(!endDate){
        endDate = ds < startDate ? startDate : ds;
        if(ds < startDate) startDate = ds;
      } else {
        startDate = ds;
        endDate = null;
      }

      updateUI();
      renderCalendar();
    };

    grid.appendChild(cell);
  }
}

// =============================
// UI UPDATE
// =============================
function updateUI(){
  const r = el("selectedRange");
  const t = el("totalDays");
  const rt = el("rentalType");
  const tp = el("totalPrice");
  const dp = el("depositDue");

  if(!startDate){
    if(r) r.textContent="None";
    if(t) t.textContent="0";
    return;
  }

  if(!endDate){
    if(r) r.textContent=startDate;
    if(t) t.textContent="1";
    return;
  }

  const days = daysBetween(startDate,endDate);
  const price = getPricing("Stump Grinder",days);

  if(r) r.textContent=`${startDate} → ${endDate}`;
  if(t) t.textContent=days;
  if(rt) rt.textContent=price.type;
  if(tp) tp.textContent=price.total;
  if(dp) dp.textContent=price.deposit;
}

// =============================
// LOAD BOOKINGS
// =============================
async function loadBookings(){
  try {
    if(!supabase){
      cachedBookings=[];
      return;
    }

    const {data,error}=await supabase
      .from("bookings")
      .select("*");

    if(error){
      console.warn(error);
      cachedBookings=[];
      return;
    }

    cachedBookings=data||[];
  } catch(e){
    console.warn(e);
    cachedBookings=[];
  }
}

// =============================
// INIT (FIXED ORDER - YOUR KEY FIX)
// =============================
async function init(){
  console.log("INIT START");

  await waitForDOM();
  console.log("DOM READY");

  renderHeaders();
  initSupabase();

  await loadBookings();

  renderCalendar();
  updateUI();

  console.log("INIT COMPLETE");
}

init();
</script>
